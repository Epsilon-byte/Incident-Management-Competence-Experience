services:
  elasticsearch:
    image: "elasticsearch:${elasticsearch_image_version}"
    container_name: cortex-elasticsearch
    hostname: elasticsearch
    restart: unless-stopped
    user: "${UID}:${GID}"
    environment:
      - http.host=0.0.0.0
      - discovery.type=single-node
      - cluster.name=hive
      - thread_pool.search.queue_size=100000
      - thread_pool.write.queue_size=100000
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1G -Xmx1G
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
      - ./elasticsearch/logs:/usr/share/elasticsearch/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    networks:
      - cortex-network

  cortex:
    image: "thehiveproject/cortex:${cortex_image_version}"
    container_name: cortex-app
    hostname: cortex
    restart: unless-stopped
    environment:
      - es_uri=http://elasticsearch:9200
      - job_directory=/tmp/cortex-jobs
      - docker_job_directory=${cortex_docker_job_directory}
      - |
        JAVA_OPTS=
          -Xms1G
          -Xmx1G
          -XX:MaxMetaspaceSize=256m
          -XX:ReservedCodeCacheSize=128m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./cortex/cortex-jobs:/tmp/cortex-jobs
      - ./cortex/config:/etc/cortex:ro
      - ./cortex/logs:/var/log/cortex
      - ./cortex/neurons:/opt/cortexneurons
    depends_on:
      - elasticsearch
    networks:
      - cortex-network

  nginx:
    image: "nginx:${nginx_image_version}"
    container_name: cortex-nginx
    hostname: nginx
    restart: unless-stopped
    environment:
      SERVER_NAME: "${nginx_server_name}"
      NGINX_SSL_TRUSTED_CERTIFICATE: "${nginx_ssl_trusted_certificate}"
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./nginx/certs:/etc/nginx/certs
    ports:
      - "8443:443"
    depends_on:
      - cortex
    networks:
      - cortex-network

networks:
  cortex-network:
    name: cortex-network
