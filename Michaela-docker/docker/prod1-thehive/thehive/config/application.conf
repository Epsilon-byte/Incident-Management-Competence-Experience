# SECRET CONFIGURATION
include "/etc/thehive/secret.conf"

# DATABASE CONFIGURATION
db.janusgraph.storage {
  backend = cql
  hostname = ["cassandra"]
  cql {
    cluster-name = thp
    keyspace = thehive
  }
}

# INDEX DATABASE CONFIGURATION
include "/etc/thehive/index.conf"

# ATTACHMENTS STORAGE CONFIGURATION
storage {
  ## Local filesystem
  provider: localfs
  localfs {
    location: /opt/thp/thehive/files
  }
}

# SERVICE CONFIGURATION
stream.longPolling.refresh: 45 seconds
play.http.context : "/"
play.http.parser.maxDiskBuffer: 1GB
play.http.parser.maxMemoryBuffer: 256kB
play.http.session.secure: false
### Stream configuration
stream {
  get {
    maxAttempts = 5
    minBackoff = 100 milliseconds
    maxBackoff = 500 milliseconds
    randomFactor = 0.2
  }
}

cortex {
  servers = [
    {
      name = "prod1-cortex"
      url  = "http://cortex:9001"
      auth {
        type = "key"
        key  = "bw7hqMmHkOQs3RD51iBur9KOa2N+BrJq"
      }
    }
  ]
}

misp {
  servers = [
    {
      name = "misp"
      url = "https://misp-core"
      auth {
        key = "r4GBOjIgUtj3NB9TXtqr9xpT74Vqp1Y9bVpIQGxT"
      }
      wsConfig {
        ssl {
          trustAll = true
        }
      }
    }
  ]
}

# CONNECTORS
# Enable Cortex connector
scalligraph.modules += org.thp.thehive.connector.cortex.CortexModule
# Enable MISP connector
scalligraph.modules += org.thp.thehive.connector.misp.MispModule
